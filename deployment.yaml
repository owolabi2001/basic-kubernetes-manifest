apiVersion: apps/v1
kind: Deployment
metadata:
  name: libary-app
  namespace: libary-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: library-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: library-app
    spec:
      containers:
        - name: libary-app
          image: owolabitemi/libary-clean:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: libary-config-map    # ← injects all configmap vars
            - secretRef:
                name: libary-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20